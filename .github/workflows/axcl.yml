          api = HfApi(token=os.environ['HF_TOKEN'])
          filename = f'frigate-{os.environ[\"RPi_AXCL_TAG\"]}.tar'
          repo_id = os.environ['HF_REPO_ID']
          repo_type = os.environ['HF_REPO_TYPE']

          print(f'Uploading {filename} to {repo_id} ({repo_type}) on branch rpi-axcl...')
          api.upload_file(
              path_or_fileobj=filename,
              path_in_repo=filename,
              repo_id=repo_id,
              repo_type=repo_type,
              revision='rpi-axcl'
          )
          print('Upload completed!')
          "