        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN secret is not set"
            exit 1
          fi

          if [ -z "$HF_REPO_ID" ] || [ "$HF_REPO_ID" = "your-username/your-repo-name" ]; then
            echo "Error: Please provide a valid Hugging Face repository ID"
            exit 1
          fi

          pip install huggingface_hub

          python -c "
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ['HF_TOKEN'])
          filename = f'frigate-{os.environ[\"RK_AXCL_TAG\"]}.tar'
          repo_id = os.environ['HF_REPO_ID']
          repo_type = os.environ['HF_REPO_TYPE']

          print(f'Uploading {filename} to {repo_id} ({repo_type}) on branch rk-axcl...')
          api.upload_file(
              path_or_fileobj=filename,
              path_in_repo=filename,
              repo_id=repo_id,
              repo_type=repo_type,
              revision='rk-axcl'
          )
          print('Upload completed!')
          "

  rpi_axcl_builds:
    runs-on: ubuntu-22.04-arm
    name: RPi_AXCL Build
    steps:
