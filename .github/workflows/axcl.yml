name: AXCL

on:
  workflow_dispatch:
    inputs:
      upload_x86_to_hf:
        description: 'Upload x86 image to Hugging Face?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_rk_to_hf:
        description: 'Upload rk image to Hugging Face?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_rpi_to_hf:
        description: 'Upload rpi image to Hugging Face?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      hf_repo_id:
        description: 'Hugging Face Repository ID'
        required: false
        default: 'AXERA-TECH/frigate-resource'
      hf_repo_type:
        description: 'Repository type'
        required: false
        default: 'model'
        type: choice
        options:
          - model
          - dataset
          - space

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.9

jobs:
  x86_axcl_builds:
    runs-on: ubuntu-22.04
    name: x86_AXCL Build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set x86_AXCL_TAG
        run: echo "x86_AXCL_TAG=x86-axcl-${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Set Version
        run: make version
      
      - name: Build
        uses: docker/bake-action@v6
        with:
          source: .
          push: false
          targets: x86-axcl
          files: docker/axcl/x86-axcl.hcl
          no-cache: true
          set: |
            x86-axcl.tags=frigate:${{ env.x86_AXCL_TAG }}
      
      - name: Clean up disk space
        run: |
          docker system prune -f
 
      - name: Save Docker image as tar file
        run: |
          docker save frigate:${{ env.x86_AXCL_TAG }} -o frigate-${{ env.x86_AXCL_TAG }}.tar
          ls -lh frigate-${{ env.x86_AXCL_TAG }}.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86-axcl-docker-image
          path: frigate-${{ env.x86_AXCL_TAG }}.tar
          retention-days: 7

      - name: Upload to Hugging Face Hub (x86)
        if: ${{ github.event.inputs.upload_x86_to_hf == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ github.event.inputs.hf_repo_id }}
          HF_REPO_TYPE: ${{ github.event.inputs.hf_repo_type }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN secret is not set"
            exit 1
          fi

          if [ -z "$HF_REPO_ID" ] || [ "$HF_REPO_ID" = "your-username/your-repo-name" ]; then
            echo "Error: Please provide a valid Hugging Face repository ID"
            exit 1
          fi

          pip install huggingface_hub

          python -c "
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ['HF_TOKEN'])
          filename = f'frigate-{os.environ[\"x86_AXCL_TAG\"]}.tar'
          repo_id = os.environ['HF_REPO_ID']
          repo_type = os.environ['HF_REPO_TYPE']

          print(f'Uploading {filename} to {repo_id} ({repo_type}) on branch x86-axcl...')
          api.upload_file(
              path_or_fileobj=filename,
              path_in_repo=filename,
              repo_id=repo_id,
              repo_type=repo_type,
              revision='x86-axcl'
          )
          print('Upload completed!')
          "

  rk_axcl_builds:
    runs-on: ubuntu-22.04-arm
    name: rk_AXCL Build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set RK_AXCL_TAG
        run: echo "RK_AXCL_TAG=rk-axcl-${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Set Version
        run: make version

      - name: Build
        uses: docker/bake-action@v6
        with:
          source: .
          push: false
          targets: rk-axcl
          files: |
            docker/rockchip/rk.hcl
            docker/axcl/rk-axcl.hcl
          no-cache: true
          set: |
            rk-axcl.tags=frigate:${{ env.RK_AXCL_TAG }}

      - name: Clean up disk space
        run: |
          docker system prune -f

      - name: Save Docker image as tar file
